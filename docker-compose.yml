services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_api_app
    volumes:
      - ./src:/var/www
    networks:
      - task-network

  nginx:
    image: nginx:latest
    container_name: task_api_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - task-network

  db:
    image: mysql:8
    container_name: task_api_db
    restart: always
    environment:
      MYSQL_DATABASE: task_api
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - task-network

networks:
  task-network: